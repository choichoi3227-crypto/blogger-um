# wrangler.toml — Cloudflare Workers 배포 설정 (v7)
# ⚠️ CI 환경의 이름과 일치하도록 수정 완료
name        = "blogger-um"
main        = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ❌ ES 모듈 에러를 유발하던 [wasm_modules] 섹션 제거 완료
# fflate는 순수 JS이므로 별도의 WASM 바인딩 없이 코드 내에서 import하여 쓰시면 됩니다.

[[kv_namespaces]]
binding  = "SLUG_KV"
id       = "dee1ee21fe4c44559bce049b53cf4d0a"

[[kv_namespaces]]
binding  = "MEDIA_KV"
id       = "5331bf100cef47378cc1f89487f3a087"

[[kv_namespaces]]
binding  = "CACHE_RESERVE_KV"
id       = "7153daa4c5874bc581670f75adf66a22"

[vars]
GITHUB_BRANCH = "main"

# 시크릿은 wrangler secret put 명령으로 별도 설정
# wrangler secret put GITHUB_TOKEN
# wrangler secret put GITHUB_OWNER
# wrangler secret put GITHUB_REPO

[triggers]
crons = ["0 */6 * * *"]   # 6시간마다 미디어 큐 처리 + 슬러그 재검토
